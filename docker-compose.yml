version: '3.9'

services:

  # ─── BotPanel Backend (ASP.NET Core) ─────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: botpanel-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./bots:/bots                              # Bot files — container sees them at /bots
      - /var/run/docker.sock:/var/run/docker.sock # Docker socket to manage child containers
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - BotsPath=/bots
      # Must match the HOST-side absolute path of the ./bots volume above.
      # When the backend launches a bot container, Docker resolves volume paths
      # against the HOST filesystem, not the backend container filesystem.
      - BOTS_HOST_PATH=/opt/botpanel/bots
    networks:
      - botpanel

  # ─── Frontend nginx ───────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: botpanel-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - botpanel

networks:
  botpanel:
    driver: bridge
